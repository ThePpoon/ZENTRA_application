<div class="app-layout">
  <div id="navbar-mount"></div>

  <div class="app-body settings-layout">

    <!-- Left Sidebar -->
    <div class="settings-sidebar">
      <div class="settings-menu-item active" data-section="line"    onclick="showSection('line',   this)">การแจ้งเตือน Line</div>
      <div class="settings-menu-item"        data-section="zone"    onclick="showSection('zone',   this)">Safety Zone</div>
      <div class="settings-menu-item"        data-section="ai"      onclick="showSection('ai',     this)">การตรวจจับ AI</div>
      <div class="settings-menu-item"        data-section="camera"  onclick="showSection('camera', this)">กล้องและวิดีโอ</div>
      <div class="settings-menu-item"        data-section="data"    onclick="showSection('data',   this)">เกี่ยวกับข้อมูล</div>
      <div class="settings-menu-item"        data-section="about"   onclick="showSection('about',  this)">เกี่ยวกับระบบ</div>
      <div class="settings-status-bar">
        <div class="status-dot ok"></div>
        ระบบทำงานปกติ
      </div>
    </div>

    <!-- Main Content -->
    <div class="settings-content" id="settings-content">
      <!-- injected by showSection() -->
    </div>

  </div>
</div>

<!-- ─── Section Templates ─────────────────────────── -->
<template id="tpl-line">
  <div class="settings-section-title">การแจ้งเตือน LINE OA</div>
  <div class="settings-section-sub">ตั้งค่า Token และกลุ่มที่รับการแจ้งเตือนแต่ละระดับ</div>

  <div class="settings-group">
    <div class="settings-group-title">LINE Notify Token</div>
    <div class="input-row">
      <input class="input" id="line-token" type="password" placeholder="Channel Access Token...">
      <button class="btn btn-ghost btn-sm" onclick="toggleToken()">แสดง / แก้ไข</button>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">กลุ่มรับการแจ้งเตือน</div>
    <table class="alert-table w-full">
      <thead>
        <tr><th>ระดับ</th><th>กลุ่มที่ส่ง</th><th>Cooldown</th><th>เปิด</th></tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="level-badge warning">⚠ WARNING</span><br><small class="text-muted">ไม่สวม PPE</small></td>
          <td><span class="text-sub">หัวหน้างาน</span></td>
          <td><input class="cooldown-input" id="cd-warning" type="number" value="30"> s</td>
          <td>
            <label class="toggle"><input type="checkbox" id="tog-warning" checked>
            <div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </td>
        </tr>
        <tr>
          <td><span class="level-badge alert">🔴 ALERT</span><br><small class="text-muted">เข้าพื้นที่อันตราย</small></td>
          <td><span class="text-sub">Safety Officer, หัวหน้างาน</span></td>
          <td><input class="cooldown-input" id="cd-alert" type="number" value="20"> s</td>
          <td>
            <label class="toggle"><input type="checkbox" id="tog-alert" checked>
            <div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </td>
        </tr>
        <tr>
          <td><span class="level-badge emergency">🆘 EMERGENCY</span><br><small class="text-muted">ตรวจพบการล้ม</small></td>
          <td><span class="text-sub">Emergency, Safety Officer, หัวหน้างาน</span></td>
          <td><input class="cooldown-input" id="cd-emergency" type="number" value="15"> s</td>
          <td>
            <label class="toggle"><input type="checkbox" id="tog-emergency" checked>
            <div class="toggle-track"></div><div class="toggle-thumb"></div></label>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">เกณฑ์การตรวจจับ AI</div>
    <div class="flex flex-col gap-3">
      <div>
        <div class="flex justify-between mb-1">
          <span class="input-label">PPE Confidence threshold</span>
          <span class="text-accent font-600" id="val-ppe">0.70</span>
        </div>
        <input type="range" min="0.30" max="0.95" step="0.01" value="0.70" id="sl-ppe"
               oninput="document.getElementById('val-ppe').textContent=parseFloat(this.value).toFixed(2)">
      </div>
      <div>
        <div class="flex justify-between mb-1">
          <span class="input-label">Fall detection — frame confirmation</span>
          <span class="text-accent font-600" id="val-frames">6</span> <span class="text-muted text-xs"> frame</span>
        </div>
        <input type="range" min="1" max="20" step="1" value="6" id="sl-frames"
               oninput="document.getElementById('val-frames').textContent=this.value">
      </div>
      <div>
        <div class="flex justify-between mb-1">
          <span class="input-label">Bbox ratio threshold (แนวนอน)</span>
          <span class="text-accent font-600" id="val-ratio">0.72</span>
        </div>
        <input type="range" min="0.50" max="0.95" step="0.01" value="0.72" id="sl-ratio"
               oninput="document.getElementById('val-ratio').textContent=parseFloat(this.value).toFixed(2)">
      </div>
    </div>
  </div>

  <div style="display:flex;gap:8px;margin-top:8px;">
    <button class="btn btn-primary" onclick="saveSettings()">บันทึกการตั้งค่า</button>
    <button class="btn btn-ghost"   onclick="loadSettings()">รีเซ็ต</button>
  </div>
  <div id="save-msg" style="margin-top:8px;font-size:12px;color:var(--green);min-height:16px;"></div>
</template>

<template id="tpl-ai">
  <div class="settings-section-title">การตรวจจับ AI</div>
  <div class="settings-section-sub">ปรับค่าเกณฑ์และความไวของโมดูลต่าง ๆ</div>
  <div class="settings-group">
    <div class="flex flex-col gap-3">
      <div>
        <div class="flex justify-between mb-1">
          <span class="input-label">PPE Confidence threshold</span>
          <span class="text-accent font-600" id="val-ppe">0.70</span>
        </div>
        <input type="range" min="0.30" max="0.95" step="0.01" value="0.70" id="sl-ppe"
               oninput="document.getElementById('val-ppe').textContent=parseFloat(this.value).toFixed(2)">
      </div>
      <div>
        <div class="flex justify-between mb-1">
          <span class="input-label">Fall — frame confirmation</span>
          <span class="text-accent font-600" id="val-frames">6</span>
        </div>
        <input type="range" min="1" max="20" step="1" value="6" id="sl-frames"
               oninput="document.getElementById('val-frames').textContent=this.value">
      </div>
      <div>
        <div class="flex justify-between mb-1">
          <span class="input-label">Bbox ratio threshold</span>
          <span class="text-accent font-600" id="val-ratio">0.72</span>
        </div>
        <input type="range" min="0.50" max="0.95" step="0.01" value="0.72" id="sl-ratio"
               oninput="document.getElementById('val-ratio').textContent=parseFloat(this.value).toFixed(2)">
      </div>
    </div>
  </div>
  <button class="btn btn-primary mt-2" onclick="saveSettings()">บันทึก</button>
  <div id="save-msg" style="margin-top:8px;font-size:12px;color:var(--green);min-height:16px;"></div>
</template>

<template id="tpl-camera">
  <div class="settings-section-title">กล้องและวิดีโอ</div>
  <div class="settings-section-sub">ตั้งค่าแหล่งภาพและการแสดงผล</div>
  <div class="settings-group">
    <label class="input-label">แหล่งภาพปัจจุบัน</label>
    <div class="flex gap-3 items-center mb-3">
      <span class="text-accent font-600" id="cur-source">—</span>
      <button class="btn btn-outline btn-sm" onclick="changeSource()">เปลี่ยนแหล่งภาพ</button>
    </div>
    <label class="input-label">Webcam Index (USB)</label>
    <input class="input mb-2" id="cam-idx" type="number" value="0" min="0" max="9" style="width:80px">
    <div class="toggle-wrap mt-2">
      <label class="toggle"><input type="checkbox" id="flip-h" checked>
      <div class="toggle-track"></div><div class="toggle-thumb"></div></label>
      <span class="text-sub">พลิกภาพแนวนอน (Mirror)</span>
    </div>
  </div>
  <button class="btn btn-primary mt-2" onclick="saveSettings()">บันทึก</button>
  <div id="save-msg" style="margin-top:8px;font-size:12px;color:var(--green);min-height:16px;"></div>
</template>

<template id="tpl-zone">
  <div class="settings-section-title">Safety Zone</div>
  <div class="settings-section-sub">จัดการโซนความปลอดภัยผ่านหน้า Zone Editor</div>
  <div class="card mt-2" style="text-align:center;padding:20px;">
    <p class="text-sub mb-3">ตั้งค่าโซนอันตรายได้จากหน้า Zone Editor</p>
    <button class="btn btn-primary" onclick="ZENTRA.navigate('zone_editor')">ไปที่ Zone Editor</button>
  </div>
</template>

<template id="tpl-data">
  <div class="settings-section-title">เกี่ยวกับข้อมูล</div>
  <div class="settings-section-sub">ข้อมูลที่ระบบเก็บไว้และการจัดการข้อมูล</div>
  <div class="settings-group">
    <div class="settings-group-title">ข้อมูลที่เก็บสะสม</div>
    <div class="card">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sub">PPE violations</span><span class="text-accent">—</span>
      </div>
      <div class="flex justify-between items-center mb-2">
        <span class="text-sub">Zone intrusions</span><span class="text-accent">—</span>
      </div>
      <div class="flex justify-between items-center mb-2">
        <span class="text-sub">Fall events</span><span class="text-accent">—</span>
      </div>
      <div class="flex justify-between items-center">
        <span class="text-sub">Normal frames</span><span class="text-accent">—</span>
      </div>
    </div>
  </div>
</template>

<template id="tpl-about">
  <div class="settings-section-title">เกี่ยวกับระบบ</div>
  <div class="settings-section-sub">ข้อมูลเวอร์ชันและผู้พัฒนา</div>
  <div class="card mt-2">
    <div class="flex justify-between items-center mb-2">
      <span class="text-sub">Version</span><span class="text-accent">1.0.0</span>
    </div>
    <div class="flex justify-between items-center mb-2">
      <span class="text-sub">PPE Model</span><span class="text-accent">ppe-cpxsz/2</span>
    </div>
    <div class="flex justify-between items-center mb-2">
      <span class="text-sub">Fall Model</span><span class="text-accent">fall-detection-ovjqo/5</span>
    </div>
    <div class="flex justify-between items-center mb-2">
      <span class="text-sub">Inference Server</span><span id="inf-status" class="text-accent">ตรวจสอบ...</span>
    </div>
    <div class="flex justify-between items-center">
      <span class="text-sub">CEDT Innovation Summit 2026</span>
      <span class="text-sub">IndustryTech Track</span>
    </div>
  </div>
</template>

<script>
var _settings = {};

function init_settings() {
  document.getElementById('navbar-mount').innerHTML = renderNavbar('settings');
  loadSettings().then(() => showSection('line', document.querySelector('.settings-menu-item[data-section="line"]')));
}

async function loadSettings() {
  try {
    const res = await fetch('/api/settings');
    _settings = await res.json();
  } catch (_) { _settings = {}; }
}

function showSection(name, el) {
  document.querySelectorAll('.settings-menu-item').forEach(i => i.classList.remove('active'));
  if (el) el.classList.add('active');

  const tpl = document.getElementById(`tpl-${name}`);
  const content = document.getElementById('settings-content');
  if (!tpl) { content.innerHTML = '<p class="text-muted" style="padding:20px">กำลังพัฒนา...</p>'; return; }

  content.innerHTML = '';
  content.appendChild(tpl.content.cloneNode(true));

  // Populate values
  if (name === 'line' || name === 'ai') {
    const ai = _settings.ai || {};
    const sl_ppe = document.getElementById('sl-ppe');
    if (sl_ppe) { sl_ppe.value = ai.ppe_confidence ?? 0.70; document.getElementById('val-ppe').textContent = parseFloat(sl_ppe.value).toFixed(2); }
    const sl_frames = document.getElementById('sl-frames');
    if (sl_frames) { sl_frames.value = ai.fall_confirm_frames ?? 6; document.getElementById('val-frames').textContent = sl_frames.value; }
    const sl_ratio = document.getElementById('sl-ratio');
    if (sl_ratio) { sl_ratio.value = ai.fall_bbox_ratio ?? 0.72; document.getElementById('val-ratio').textContent = parseFloat(sl_ratio.value).toFixed(2); }
  }
  if (name === 'line') {
    const line = _settings.line || {};
    const tok = document.getElementById('line-token');
    if (tok) tok.value = line.channel_access_token || '';
    const alerts = _settings.alerts || {};
    const cdW = document.getElementById('cd-warning'); if (cdW) cdW.value = alerts.violation_cooldown_seconds ?? 30;
    const cdA = document.getElementById('cd-alert');   if (cdA) cdA.value = alerts.zone_cooldown_seconds    ?? 20;
    const cdE = document.getElementById('cd-emergency');if (cdE) cdE.value = alerts.fall_cooldown_seconds   ?? 15;
    const togW = document.getElementById('tog-warning'); if (togW) togW.checked = alerts.warning_enabled ?? true;
    const togA = document.getElementById('tog-alert');   if (togA) togA.checked = alerts.alert_enabled   ?? true;
    const togE = document.getElementById('tog-emergency');if (togE) togE.checked = alerts.emergency_enabled?? true;
  }
  if (name === 'camera') {
    const cam = _settings.camera || {};
    const src = document.getElementById('cur-source'); if (src) src.textContent = cam.source || 'webcam';
    const idx = document.getElementById('cam-idx');    if (idx) idx.value = cam.webcam_index ?? 0;
    const flip= document.getElementById('flip-h');     if (flip) flip.checked = cam.flip_horizontal ?? true;
  }
  if (name === 'about') {
    fetch('/api/status').then(r => r.json()).then(d => {
      const el = document.getElementById('inf-status');
      if (el) el.textContent = d.running ? 'ออนไลน์' : 'ออฟไลน์ (Demo)';
    }).catch(() => {});
  }
}

async function saveSettings() {
  // Collect current values
  const s = JSON.parse(JSON.stringify(_settings));

  const sl_ppe    = document.getElementById('sl-ppe');
  const sl_frames = document.getElementById('sl-frames');
  const sl_ratio  = document.getElementById('sl-ratio');
  if (sl_ppe)    { s.ai = s.ai || {}; s.ai.ppe_confidence    = parseFloat(sl_ppe.value); }
  if (sl_frames) { s.ai = s.ai || {}; s.ai.fall_confirm_frames= parseInt(sl_frames.value); }
  if (sl_ratio)  { s.ai = s.ai || {}; s.ai.fall_bbox_ratio   = parseFloat(sl_ratio.value); }

  const tok = document.getElementById('line-token');
  if (tok) { s.line = s.line || {}; s.line.channel_access_token = tok.value; }

  const cdW = document.getElementById('cd-warning'); if (cdW) { s.alerts = s.alerts || {}; s.alerts.violation_cooldown_seconds = parseInt(cdW.value); }
  const cdA = document.getElementById('cd-alert');   if (cdA) { s.alerts = s.alerts || {}; s.alerts.zone_cooldown_seconds     = parseInt(cdA.value); }
  const cdE = document.getElementById('cd-emergency');if (cdE){ s.alerts = s.alerts || {}; s.alerts.fall_cooldown_seconds      = parseInt(cdE.value); }

  const idx  = document.getElementById('cam-idx'); if (idx)  { s.camera = s.camera || {}; s.camera.webcam_index = parseInt(idx.value); }
  const flip = document.getElementById('flip-h');  if (flip) { s.camera = s.camera || {}; s.camera.flip_horizontal = flip.checked; }

  try {
    await fetch('/api/settings', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(s),
    });
    _settings = s;
    const msg = document.getElementById('save-msg');
    if (msg) { msg.textContent = '✓ บันทึกสำเร็จ'; setTimeout(() => { if(msg) msg.textContent=''; }, 2000); }
  } catch (_) {}
}

function toggleToken() {
  const t = document.getElementById('line-token');
  if (t) t.type = (t.type === 'password') ? 'text' : 'password';
}

async function changeSource() {
  await fetch('/api/pipeline/stop', { method: 'POST' });
  ZENTRA.state.pipeline.running = false;
  ZENTRA.navigate('source');
}
</script>
