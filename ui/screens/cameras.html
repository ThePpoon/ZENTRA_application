<div style="height:100%;overflow-y:auto;background:var(--bg)">
<div style="padding:24px 28px 28px;min-height:100%;display:flex;flex-direction:column;box-sizing:border-box">

  <!-- ── Header ── -->
  <div style="margin-bottom:18px;flex-shrink:0">
    <div style="font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px">Cameras</div>
    <div style="font-size:13px;color:var(--text-sub);margin-top:2px">Connected video sources on this device</div>
  </div>

  <!-- ── Summary Cards ── -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;flex-shrink:0">

    <!-- Add Camera -->
    <button onclick="ZENTRA.navigate('source')" style="background:transparent;border:1.5px dashed var(--border-mid);border-radius:12px;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;cursor:pointer;font-family:var(--font);min-height:118px;transition:border-color .15s,background .15s"
      onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--accent-dim)'"
      onmouseout="this.style.borderColor='var(--border-mid)';this.style.background='transparent'">
      <span style="width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg>
      </span>
      <div style="text-align:center">
        <div style="font-size:13.5px;font-weight:700;color:var(--text)">Add Camera</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">Connect source</div>
      </div>
    </button>

    <!-- Online -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:var(--text-sub)">Online</span>
        <span style="width:26px;height:26px;border-radius:50%;background:var(--green-dim);color:var(--green);display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </span>
      </div>
      <div style="font-size:30px;font-weight:800;color:var(--text);margin-top:10px;font-variant-numeric:tabular-nums" id="cam-count-online">1</div>
    </div>

    <!-- Offline -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:var(--text-sub)">Offline</span>
        <span style="width:26px;height:26px;border-radius:50%;background:var(--red-dim);color:var(--red);display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </span>
      </div>
      <div style="font-size:30px;font-weight:800;color:var(--text);margin-top:10px;font-variant-numeric:tabular-nums" id="cam-count-offline">0</div>
    </div>

    <!-- Storage -->
    <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:18px 20px;display:flex;flex-direction:column;justify-content:space-between">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;color:var(--text-sub)">Storage Used</span>
        <span style="width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>
        </span>
      </div>
      <div style="font-size:30px;font-weight:800;color:var(--text);margin-top:10px;font-variant-numeric:tabular-nums"><span id="cam-storage">—</span><span style="font-size:16px;color:var(--text-muted)" id="cam-storage-unit">GB</span></div>
    </div>
  </div>

  <!-- ── Camera Table ── -->
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;flex:1">

    <!-- Table header bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)">
      <span style="font-size:15px;font-weight:700;color:var(--text)">All Cameras</span>
      <div style="display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:8px;padding:7px 11px;color:var(--text-muted)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <span style="font-size:13px">Search…</span>
      </div>
    </div>

    <!-- Column headers -->
    <div style="display:grid;grid-template-columns:1.6fr 80px 1.2fr 1fr .9fr 1.4fr 1fr;gap:12px;padding:11px 20px;background:var(--bg-card-alt);border-bottom:1px solid var(--border)">
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">Name</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">Feed</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">Location</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">Added</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">Rules</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">Compliance</span>
      <span style="font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;text-transform:uppercase">Status</span>
    </div>

    <!-- Camera row -->
    <div id="cam-table-body">
      <div style="display:grid;grid-template-columns:1.6fr 80px 1.2fr 1fr .9fr 1.4fr 1fr;gap:12px;padding:14px 20px;align-items:center;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:13.5px;font-weight:600;color:var(--text)" id="cam-row-name">Camera #1</div>
          <div style="font-size:11px;color:var(--text-muted);font-family:ui-monospace,monospace;margin-top:2px" id="cam-row-src">—</div>
        </div>
        <div style="width:64px;height:40px;border-radius:6px;background:var(--bg-video);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);overflow:hidden">
          <img id="cam-thumb" src="" style="width:100%;height:100%;object-fit:cover;display:none" alt="">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="cam-thumb-ico"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>
        </div>
        <span style="font-size:13px;color:var(--text-sub)">Line A · Assembly</span>
        <span style="font-size:13px;color:var(--text-sub);font-variant-numeric:tabular-nums" id="cam-row-date">—</span>
        <span style="font-size:13px;color:var(--text);font-weight:600">3</span>
        <div style="display:flex;align-items:center;gap:9px">
          <div style="flex:1;height:7px;border-radius:99px;background:var(--bg-card-alt);overflow:hidden">
            <div id="cam-compliance-bar" style="width:82%;height:100%;background:var(--green);border-radius:99px;transition:width .4s"></div>
          </div>
          <span style="font-size:12px;font-weight:600;color:var(--text-sub);font-variant-numeric:tabular-nums" id="cam-compliance-pct">82%</span>
        </div>
        <span id="cam-status-badge" style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:var(--green-dim);color:var(--green);font-size:11.5px;font-weight:700">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span>Online
        </span>
      </div>
    </div>

    <!-- Pagination bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-top:1px solid var(--border)">
      <span style="font-size:12.5px;color:var(--text-muted)">Showing 1 of 1 camera</span>
      <div style="display:flex;gap:6px">
        <button style="width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:not-allowed;opacity:.5">‹</button>
        <button style="width:30px;height:30px;border-radius:7px;border:none;background:var(--accent);color:#fff;font-weight:600;cursor:pointer">1</button>
        <button style="width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:not-allowed;opacity:.5">›</button>
      </div>
    </div>
  </div>

  <!-- ── Footer ── -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding-top:18px;margin-top:24px;border-top:1px solid var(--border);flex-shrink:0">
    <div style="display:flex;align-items:center;gap:9px">
      <div style="width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#6D3BFF,var(--accent));display:flex;align-items:center;justify-content:center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/></svg>
      </div>
      <span style="font-size:12.5px;color:var(--text-muted)">ZENTRA · On-device factory safety AI</span>
    </div>
    <span style="font-size:12px;color:var(--text-muted)">© 2026 ZENTRA · PDPA compliant</span>
  </div>

</div>
</div>

<script>
function init_cameras() {
  // Update compliance from alert ratio
  var compliance = 82;
  var a = ZENTRA.state.alerts || {};
  if (a.total && a.total > 0) {
    compliance = Math.max(0, Math.round(100 - (a.total * 3)));
  }
  var bar = document.getElementById('cam-compliance-bar');
  var pct = document.getElementById('cam-compliance-pct');
  if (bar) bar.style.width = compliance + '%';
  if (pct) pct.textContent = compliance + '%';

  // Camera status
  var cam = ZENTRA.state.camera;
  var badge = document.getElementById('cam-status-badge');
  if (badge) {
    if (cam === 'connected') {
      badge.style.background = 'var(--green-dim)'; badge.style.color = 'var(--green)';
      badge.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span>Online';
      var onEl = document.getElementById('cam-count-online');
      var offEl = document.getElementById('cam-count-offline');
      if (onEl) onEl.textContent = '1';
      if (offEl) offEl.textContent = '0';
    } else {
      badge.style.background = 'var(--red-dim)'; badge.style.color = 'var(--red)';
      badge.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:var(--red)"></span>Offline';
      var onEl2 = document.getElementById('cam-count-online');
      var offEl2 = document.getElementById('cam-count-offline');
      if (onEl2) onEl2.textContent = '0';
      if (offEl2) offEl2.textContent = '1';
    }
  }

  // Source label
  var src = document.getElementById('cam-row-src');
  if (src && ZENTRA.state.pipeline && ZENTRA.state.pipeline.source) {
    src.textContent = ZENTRA.state.pipeline.source;
  }

  // Storage estimate from API
  fetch('/api/data/stats').then(function(r) { return r.json(); }).then(function(d) {
    var gb = d.disk_used_gb || d.size_mb ? Math.round((d.size_mb || 0) / 1024 * 10) / 10 : null;
    if (gb !== null) {
      var el = document.getElementById('cam-storage');
      if (el) el.textContent = gb;
    }
  }).catch(function() {});

  // Thumbnail from last frame
  if (ZENTRA._lastFrame) {
    var thumb = document.getElementById('cam-thumb');
    var ico   = document.getElementById('cam-thumb-ico');
    if (thumb) { thumb.src = ZENTRA._lastFrame; thumb.style.display = 'block'; }
    if (ico)   ico.style.display = 'none';
  }

  // Date added
  var dateEl = document.getElementById('cam-row-date');
  if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
</script>
