<div class="app-layout">
  <!-- Navigation Bar -->
  <div id="navbar-mount"></div>

  <!-- KPI strip -->
  <div class="dashboard-kpis">
    <div class="kpi-tile"><div class="kpi-val" id="kpi-total">0</div><div class="kpi-lbl">เหตุการณ์รวมวันนี้</div></div>
    <div class="kpi-tile" id="kpi-tile-warning"><div class="kpi-val" id="kpi-warning">0</div><div class="kpi-lbl">เฝ้าระวัง (Warning)</div></div>
    <div class="kpi-tile" id="kpi-tile-emergency"><div class="kpi-val" id="kpi-emergency">0</div><div class="kpi-lbl">ฉุกเฉิน (Emergency)</div></div>
    <div class="kpi-tile"><div class="kpi-val" id="kpi-uptime">0:00</div><div class="kpi-lbl">เวลาทำงาน</div></div>
    <div class="kpi-tile"><div class="kpi-val" id="kpi-modules">0/3</div><div class="kpi-lbl">โมดูลพร้อมทำงาน</div></div>
  </div>

  <div class="app-body">
    <!-- Video Feed -->
    <div class="main-content">
      <img id="video-feed" src="/ui/assets/no-signal.svg"
           onerror="this.src=''"
           alt="Video feed">
      <span class="camera-label" id="camera-label">Camera #1</span>
      <!-- Connecting / reconnecting overlay -->
      <div class="video-overlay hidden" id="video-overlay">
        <div class="video-overlay-spinner"></div>
        <div class="video-overlay-text">กำลังเชื่อมต่อกล้อง...</div>
      </div>
    </div>

    <!-- Right Status Panel -->
    <div class="right-panel">
      <div class="right-panel-inner">

        <!-- Module Status -->
        <div>
          <div class="panel-section-title">สถานะระบบโมดูล</div>
          <div class="module-status-list">
            <div class="module-status-row">
              <div class="status-dot ok" id="dot-ppe"></div>
              <span class="module-name">PPE Detection</span>
              <span class="module-label ok" id="lbl-ppe">ปกติ</span>
            </div>
            <div class="module-status-row">
              <div class="status-dot ok" id="dot-zone"></div>
              <span class="module-name">Safety Zone</span>
              <span class="module-label ok" id="lbl-zone">ปกติ</span>
            </div>
            <div class="module-status-row">
              <div class="status-dot ok" id="dot-fall"></div>
              <span class="module-name">Heat-Stroke / Fall</span>
              <span class="module-label ok" id="lbl-fall">ปกติ</span>
            </div>
          </div>
        </div>

        <!-- Emergency Banner -->
        <div class="emergency-banner hidden" id="emergency-banner">
          <div class="emergency-title">
            <div class="emergency-dot"></div>
            EMERGENCY
          </div>
          <div class="emergency-msg">ตรวจพบเหตุฉุกเฉิน</div>
          <div class="emergency-meta">--:--:-- · Camera 1</div>
          <button class="emergency-more" title="ดูรายละเอียด" onclick="ZENTRA.navigate('history')">···</button>
        </div>

        <!-- Alarm Priority list -->
        <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
          <div class="panel-section-title">การแจ้งเตือนล่าสุด</div>
          <div class="alarm-list" id="alarm-list">
            <div class="alarm-empty" id="alarm-empty">ยังไม่มีการแจ้งเตือน</div>
          </div>
        </div>

        <!-- Actions -->
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <button class="btn btn-ghost btn-sm w-full" onclick="ZENTRA.navigate('zone_editor')">ตั้งค่าโซนความปลอดภัย</button>
          <button class="btn btn-danger btn-sm w-full" id="stop-btn" onclick="stopPipeline()">หยุด / เปลี่ยนแหล่งภาพ</button>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
function init_dashboard() {
  document.getElementById('navbar-mount').innerHTML = renderNavbar('dashboard');
  document.getElementById('camera-label').textContent = ZENTRA.state.camera_label;

  // Restore last video frame immediately (no blank feed when returning)
  if (ZENTRA._lastFrame) {
    const vf = document.getElementById('video-feed');
    if (vf) vf.src = ZENTRA._lastFrame;
  }

  ZENTRA._updateModuleStatus();
  ZENTRA._updateKPIs();
  ZENTRA._updateCameraState();
  if (ZENTRA.state.last_emergency) ZENTRA._showEmergencyBanner(ZENTRA.state.last_emergency);

  // Seed recent alarms from history, then render
  if (!ZENTRA.state.recentAlarms || !ZENTRA.state.recentAlarms.length) {
    fetch('/api/history/events?limit=20').then(r => r.json()).then(d => {
      ZENTRA.state.recentAlarms = (d.events || []).map(e => ({
        level: e.level, message: e.message, time: e.time, camera: e.camera,
      }));
      ZENTRA._renderAlarms();
    }).catch(() => ZENTRA._renderAlarms());
  } else {
    ZENTRA._renderAlarms();
  }

  ZENTRA.connectWS();
  ZENTRA.startStatusPoll();
}

async function stopPipeline() {
  const btn = document.getElementById('stop-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังหยุด...'; }
  try { await fetch('/api/pipeline/stop', { method: 'POST' }); } catch (_) {}
  ZENTRA.state.pipeline.running = false;
  ZENTRA.state.camera = 'disconnected';
  ZENTRA.stopStatusPoll();
  ZENTRA.navigate('source');
}
</script>
