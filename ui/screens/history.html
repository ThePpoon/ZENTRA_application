<div class="app-layout">
  <div id="navbar-mount"></div>

  <div class="history-layout">

    <!-- Stat Cards -->
    <div class="stat-cards" id="stat-cards">
      <div class="stat-card">
        <div class="stat-label">เหตุการณ์วันนี้</div>
        <div><span class="stat-value" id="stat-total">—</span><span class="stat-unit">ครั้ง</span></div>
      </div>
      <div class="stat-card highlight-red">
        <div class="stat-label">Emergency สะสม</div>
        <div><span class="stat-value" id="stat-emergency">—</span><span class="stat-unit">ครั้ง</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PPE violations</div>
        <div><span class="stat-value" id="stat-ppe">—</span><span class="stat-unit">ครั้ง</span></div>
      </div>
      <div class="stat-card highlight-green">
        <div class="stat-label">เวลาดำเนินงาน</div>
        <div class="stat-value" id="stat-uptime" style="font-size:22px">—</div>
        <div class="stat-sub">ระบบทำงานต่อเนื่อง</div>
      </div>
    </div>

    <!-- Body -->
    <div class="history-body">

      <!-- Left: charts -->
      <div class="history-left">
        <div class="chart-container">
          <div class="chart-title">Alert รายชั่วโมง (วันนี้)</div>
          <canvas id="hourly-chart" style="width:100%;max-height:160px;"></canvas>
        </div>

        <div class="category-bars" id="cat-bars">
          <div class="cat-bar-row">
            <span class="cat-bar-label">PPE</span>
            <div class="cat-bar-track"><div class="cat-bar-fill ppe" id="bar-ppe" style="width:0%"></div></div>
            <span class="cat-bar-count" id="cnt-ppe">—</span>
          </div>
          <div class="cat-bar-row">
            <span class="cat-bar-label">Fall</span>
            <div class="cat-bar-track"><div class="cat-bar-fill fall" id="bar-fall" style="width:0%"></div></div>
            <span class="cat-bar-count" id="cnt-fall">—</span>
          </div>
          <div class="cat-bar-row">
            <span class="cat-bar-label">Zone</span>
            <div class="cat-bar-track"><div class="cat-bar-fill zone" id="bar-zone" style="width:0%"></div></div>
            <span class="cat-bar-count" id="cnt-zone">—</span>
          </div>
        </div>
      </div>

      <!-- Right: events list -->
      <div class="history-right">
        <div class="event-list-header" style="display:flex;align-items:center;gap:6px">
          <span>บันทึกเหตุการณ์</span>
          <span id="hist-date" style="margin-left:auto;font-weight:600;color:var(--text-sub);font-size:11px;text-transform:none;letter-spacing:0">วันนี้</span>
          <button class="btn btn-ghost btn-sm" style="padding:2px 8px" title="วันก่อนหน้า" onclick="shiftDay(1)">◀</button>
          <button class="btn btn-ghost btn-sm" style="padding:2px 8px" title="วันถัดไป" onclick="shiftDay(-1)">▶</button>
        </div>
        <div class="event-list" id="event-list"></div>
        <div class="event-list-footer" style="flex-wrap:wrap">
          <button class="btn btn-ghost btn-sm" onclick="loadMoreEvents()" id="load-more-btn">โหลดเพิ่ม</button>
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()" style="margin-left:auto">CSV</button>
          <button class="btn btn-outline btn-sm" onclick="downloadReport()">รายงาน PDF</button>
          <button class="btn btn-primary btn-sm" onclick="sendLineReport(this)">ส่งสรุป LINE</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Evidence modal -->
  <div class="modal-overlay hidden" id="evidence-modal" onclick="if(event.target===this)closeEvidence()">
    <div class="modal-box">
      <div class="modal-head">
        <span class="event-badge ppe" id="ev-badge">PPE</span>
        <span class="modal-title" id="ev-msg">—</span>
        <button class="modal-close" onclick="closeEvidence()">✕</button>
      </div>
      <div class="modal-meta" id="ev-meta"></div>
      <div class="modal-img-wrap">
        <img id="ev-img" alt="ภาพหลักฐาน">
        <div id="ev-nosnap" class="alarm-empty" style="display:none">ไม่มีภาพหลักฐานสำหรับเหตุการณ์นี้</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
var _eventsOffset = 0;
var _chart = null;
var _dayOffset = 0;   // 0 = today, N = N days ago

function currentDayStr() {
  if (_dayOffset <= 0) return null;          // today
  const d = new Date(); d.setDate(d.getDate() - _dayOffset);
  return d.toISOString().slice(0, 10);
}
function _dayParam(sep) {
  const d = currentDayStr();
  return d ? `${sep}day=${d}` : '';
}
function shiftDay(delta) {
  _dayOffset = Math.max(0, _dayOffset + delta);   // can't go into the future
  const lbl = document.getElementById('hist-date');
  if (lbl) lbl.textContent = _dayOffset === 0 ? 'วันนี้' : `${currentDayStr()} (${_dayOffset} วันก่อน)`;
  _eventsOffset = 0;
  loadTodayStats(); loadHourlyChart(); loadEvents();
}

function init_history() {
  document.getElementById('navbar-mount').innerHTML = renderNavbar('history');
  loadTodayStats();
  loadHourlyChart();
  loadEvents();
}

async function loadTodayStats() {
  try {
    const res  = await fetch('/api/history/today' + _dayParam('?'));
    const data = await res.json();
    document.getElementById('stat-total').textContent    = data.total;
    document.getElementById('stat-emergency').textContent= data.emergency;
    document.getElementById('stat-ppe').textContent      = data.ppe_violations;
    document.getElementById('stat-uptime').textContent   = fmtUptime(data.uptime_seconds);

    const total = data.total || 1;
    setBar('ppe',  data.ppe_violations, total);
    setBar('fall', data.falls,          total);
    setBar('zone', data.zone_intrusions,total);
  } catch (_) {}
}

function setBar(type, count, total) {
  const pct = Math.round(count / total * 100);
  document.getElementById(`bar-${type}`).style.width = pct + '%';
  document.getElementById(`cnt-${type}`).textContent = `${count} ครั้ง (${pct}%)`;
}

function fmtUptime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  return `${h}h ${String(m).padStart(2,'0')}m`;
}

async function loadHourlyChart() {
  const canvas = document.getElementById('hourly-chart');
  if (!canvas) return;
  if (typeof Chart === 'undefined') {
    // Chart.js (CDN) failed to load — show a readable fallback
    canvas.insertAdjacentHTML('afterend',
      '<div class="text-muted" style="text-align:center;padding:12px;font-size:12px">โหลดกราฟไม่สำเร็จ (ตรวจการเชื่อมต่ออินเทอร์เน็ต)</div>');
    return;
  }
  try {
    const res  = await fetch('/api/history/hourly' + _dayParam('?'));
    const data = await res.json();
    // Build labels explicitly 00..23 — do NOT use Object.keys(data) order:
    // JS reorders integer-like string keys ("10".."23") ahead of "00".."09",
    // which shifted the window and hid the current hour.
    const labels = Array.from({ length: 24 }, (_, h) => String(h).padStart(2, '0'));
    const values = labels.map(h => data[h] || 0);

    // Light-theme axis/grid colors (slate)
    const TICK = '#64748b', GRID = 'rgba(15,23,42,0.08)';
    const ctx = canvas.getContext('2d');
    if (_chart) _chart.destroy();
    _chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: 'rgba(37, 99, 235, 0.75)',
          borderColor: '#2563eb',
          borderWidth: 1,
          borderRadius: 4,
          maxBarThickness: 26,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            ticks: { color: TICK, font: { size: 10, family: 'Sarabun' } },
            grid:  { color: GRID, display: false },
          },
          y: {
            beginAtZero: true,
            ticks: { color: TICK, font: { size: 10, family: 'Sarabun' }, stepSize: 1, precision: 0 },
            grid:  { color: GRID },
          },
        },
      },
    });
  } catch (_) {}
}

async function loadEvents(append = false) {
  try {
    const res  = await fetch(`/api/history/events?limit=20&offset=${_eventsOffset}` + _dayParam('&'));
    const data = await res.json();
    const list = document.getElementById('event-list');

    if (!append) list.innerHTML = '';
    if (!append && !data.events.length) {
      list.innerHTML = '<div class="alarm-empty">ไม่มีเหตุการณ์ในวันนี้</div>';
    }

    for (const e of data.events) {
      const div = document.createElement('div');
      div.className = 'event-item';
      div.onclick = () => openEvidence(e);
      div.innerHTML = `
        <div class="event-type-row">
          <span class="event-badge ${e.type}">${e.type.toUpperCase()}</span>
          <span class="event-desc">${(e.message||'').replace(/</g,'&lt;')}</span>
          ${e.has_snapshot ? '<span title="มีภาพหลักฐาน" style="margin-left:auto">📷</span>' : ''}
        </div>
        <div class="event-meta">
          ${e.time} · ${e.camera}
          ${e.line_sent ? ' · <span style="color:var(--green);font-size:10px">LINE ส่งแล้ว</span>' : ''}
        </div>`;
      list.appendChild(div);
    }

    _eventsOffset += data.events.length;
    document.getElementById('load-more-btn').style.display =
      data.has_more ? 'inline-flex' : 'none';
  } catch (_) {}
}

function openEvidence(e) {
  const ov = document.getElementById('evidence-modal');
  if (!ov) return;
  document.getElementById('ev-badge').className = 'event-badge ' + e.type;
  document.getElementById('ev-badge').textContent = (e.type || '').toUpperCase();
  document.getElementById('ev-msg').textContent  = e.message || '';
  document.getElementById('ev-meta').textContent = `${e.date || ''} ${e.time || ''} · ${e.camera || ''}`;
  const img = document.getElementById('ev-img');
  const non = document.getElementById('ev-nosnap');
  if (e.has_snapshot) {
    img.src = '/api/history/snapshot/' + e.id + '?t=' + Date.now();
    img.style.display = 'block'; non.style.display = 'none';
  } else {
    img.style.display = 'none'; non.style.display = 'block';
  }
  ov.classList.remove('hidden');
}
function closeEvidence() {
  const ov = document.getElementById('evidence-modal');
  if (ov) ov.classList.add('hidden');
}

async function downloadReport() {
  try {
    const res  = await fetch('/api/report/daily.pdf' + _dayParam('?'));
    if (!res.ok) { alert('สร้างรายงานไม่สำเร็จ'); return; }
    const blob = await res.blob();
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'zentra_report' + (currentDayStr() ? '_' + currentDayStr() : '') + '.pdf';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (_) { alert('สร้างรายงานไม่สำเร็จ'); }
}

async function sendLineReport(btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'กำลังส่ง...'; }
  let d;
  try {
    d = await (await fetch('/api/report/send-line', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ day: currentDayStr() }),
    })).json();
  } catch (_) { d = { ok: false }; }
  if (btn) { btn.disabled = false; btn.textContent = 'ส่งสรุป LINE'; }
  alert(d.ok ? 'ส่งสรุปเข้า LINE แล้ว' : ('ส่งไม่สำเร็จ: ' + (d.error || 'ตรวจ LINE token ใน Settings')));
}

function loadMoreEvents() { loadEvents(true); }

async function exportCSV() {
  try {
    const res = await fetch('/api/history/export.csv' + _dayParam('?'));
    const csv = await res.text();
    try {
      await window.pywebview.api.save_file(csv, 'zentra_history.csv');
    } catch (_) {
      // Fallback: browser download
      const blob = new Blob([csv], { type: 'text/csv' });
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = 'zentra_history.csv';
      a.click();
    }
  } catch (_) {}
}
</script>
